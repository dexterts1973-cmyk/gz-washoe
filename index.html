    <script>
        const modal = document.getElementById('orderModal');

        // Membuka modal dan otomatis menyesuaikan dropdown paket jika dipilih lewat card
        function openOrderModal(serviceKey = '') {
            const serviceSelect = document.getElementById('orderService');
            
            if(serviceKey === 'reguler') serviceSelect.value = "✨ Regular - Rp 20.000";
            else if(serviceKey === 'express') serviceSelect.value = "⚡ Express - Rp 35.000";
            else if(serviceKey === 'reglue') serviceSelect.value = "🔧 Reglue - Rp 35.000";
            else if(serviceKey === 'suede') serviceSelect.value = "🌪️ Suede - Rp 30.000";
            else if(serviceKey === 'rewhite') serviceSelect.value = "☀️ Rewhite - Rp 30.000";
            else if(serviceKey === 'batch') {
                serviceSelect.value = "👥 Batch Cleaning - Rp 60.000";
                document.getElementById('orderQty').value = 4;
            }
            
            modal.classList.add('show');
        }

        function closeOrderModal() {
            modal.classList.remove('show');
            document.getElementById('whatsappOrderForm').reset();
            document.getElementById('orderQty').value = 1;
        }

        // Kirim Form ke WhatsApp
        document.getElementById('whatsappOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('orderName').value;
            const phone = document.getElementById('orderPhone').value;
            const address = document.getElementById('orderAddress').value;
            const service = document.getElementById('orderService').value;
            const qty = document.getElementById('orderQty').value;
            const notes = document.getElementById('orderNotes').value || '-';

            const whatsappNumber = "6282115994231"; 

            const textMessage = `*FORM PEMESAN GZ WASHOE*%0A` +
                                `=========================%0A%0A` +
                                `👤 *Nama Lengkap:* ${name}%0A` +
                                `📞 *Nomor Telepon:* ${phone}%0A` +
                                `📍 *Alamat Lengkap:* ${address}%0A%0A` +
                                `📦 *Paket Layanan:* ${service}%0A` +
                                `%F0%9F%91%9F *Jumlah Sepatu:* ${qty} Pasang%0A` +
                                `📝 *Catatan Tambahan:* ${notes}%0A%0A` +
                                `=========================%0A` +
                                `_Mohon segera diproses ya min, terima kasih!_ 🔥`;

            const waUrl = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${textMessage}`;
            window.open(waUrl, '_blank');
            closeOrderModal();
        });

        // Tutup modal jika klik overlay
        window.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeOrderModal();
            }
        });

        // LOGIC FEEDBACK KHUSUS GUEST
        function checkFeedbackViewer() {
            const urlParams = new URLSearchParams(window.location.search);
            const isGuest = urlParams.get('guest') === '1' || localStorage.getItem('gz_guest_mode') === 'true';
            
            const disqusBox = document.getElementById('disqusBox');
            const testimoniBox = document.getElementById('testimoniBox');
            const subtitle = document.getElementById('feedback-subtitle');

            if (isGuest) {
                disqusBox.style.display = 'block';
                testimoniBox.style.display = 'none';
                subtitle.textContent = 'Komentar & ulasan pelanggan live via Disqus';
            } else {
                disqusBox.style.display = 'none';
                testimoniBox.style.display = 'block';
                subtitle.textContent = 'Testimoni pelanggan GZ Washoe';
            }
        }

        function showGuestFeedback() {
            localStorage.setItem('gz_guest_mode', 'true');
            checkFeedbackViewer();
            document.getElementById('feedback').scrollIntoView({behavior: 'smooth'});
        }

        // Jalanin pas halaman load
        checkFeedbackViewer();
    </script>
